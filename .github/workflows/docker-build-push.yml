name: Build and Push Docker Image

on:
  push:
    paths:
      - "Dockerfile"
      - "docker-entrypoint.sh"
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/moodle

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0

      - name: Extract MOODLE_TAG from Dockerfile
        id: moodle-tag
        run: |
          MOODLE_TAG=$(grep 'ARG MOODLE_TAG=' Dockerfile | head -1 | sed "s/ARG MOODLE_TAG=//")
          echo "tag=${MOODLE_TAG}" >> $GITHUB_OUTPUT
          echo "Extracted MOODLE_TAG: ${MOODLE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.moodle-tag.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check if tag exists
        id: tag-check
        run: |
          TAG="${{ steps.moodle-tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist and will be created"
          fi

      - name: Create and push Git tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.moodle-tag.outputs.tag }}"
          git config user.name "github-actions"
          git config user.email "bot@github-actions.github.com"
          git tag -a "$TAG" -m "Docker image built with Moodle $TAG"
          git push origin "$TAG"
          echo "✓ Created and pushed tag: $TAG"

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./readme.md
