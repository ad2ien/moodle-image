services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-moodle}
      POSTGRES_USER: ${DB_USER:-moodleuser}
      POSTGRES_PASSWORD: ${DB_PASS:-moodlepass123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_NAME:-moodle} -U ${DB_USER:-moodleuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Moodle Web Service
  moodle:
    image: moodle:ad2ien-5.1
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      # Persistent storage for user data
      - moodle_data:/var/www/moodledata
# -   - moodle_www:/var/www/moodle
    #TODO there's healthcheck in the Dockerfile, is it really needed?
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Redis Cache Service (optional - for improved performance)
  redis:
    image: redis:8-alpine
    container_name: moodle-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASS:-redis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - with-cache

volumes:
  postgres_data:
    driver: local
  moodle_data:
    driver: local
  redis_data:
    driver: local
